name: fetch-covers

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download covers from Spotify CDN
        run: |
          cd covers
          missing=0
          while read -r id; do
            [ -z "$id" ] && continue
            if [ ! -f "$id.jpg" ]; then
              curl -sf --retry 3 -o "$id.jpg" "https://i.scdn.co/image/$id" || { echo "FAIL $id"; missing=$((missing+1)); }
            fi
          done < ids.txt
          echo "downloaded: $(ls *.jpg 2>/dev/null | wc -l), failed: $missing"
          [ "$missing" -eq 0 ]

      - name: Commit covers
        run: |
          git config user.name "cover-fetch-bot"
          git config user.email "actions@github.com"
          git add covers
          git diff --cached --quiet && echo "nothing new" && exit 0
          git commit -m "covers: self-host album art (fetched from Spotify CDN)"
          git push
