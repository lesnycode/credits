.pf .pfbrand:hover{opacity:.7}
.pf .pflink{color:#cfc9c9;font-weight:600;font-size:14px;text-decoration:none;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;transition:.15s}
.pf .pflink .ar{color:#cf2c04;transition:transform .15s}
.pf .pflink:hover{color:#fff}
.pf .pflink:hover .ar{transform:translateX(4px)}
.pf .navlinks{display:flex;align-items:center;gap:14px}

.pf .pfworks{display:inline-flex;color:#cf2c04;white-space:nowrap}
.pf .pfworks:hover{color:#cf2c04}
.pf .lead{font-size:24px;letter-spacing:.5px;color:#cf2c04;text-transform:uppercase;font-weight:700}
.pf .pfhero{position:relative;border-radius:14px;overflow:hidden;background:#201f1e center 32%/cover no-repeat;aspect-ratio:16/9;margin:0 0 40px;display:flex;align-items:flex-end}
.pf .pfhero::after{content:'';position:absolute;inset:0;background:linear-gradient(transparent 38%,rgba(0,0,0,.9))}
.pf .pfcount{position:relative;z-index:2;padding:30px 34px}
.pf .pfnum{font-size:clamp(34px,8vw,86px);font-weight:800;letter-spacing:-.02em;line-height:1;color:#fff}
.pf .pfnum b{color:#cf2c04;font-weight:800}
.pf .pfcap{font-size:clamp(13px,2.4vw,20px);font-weight:700;color:#e6dede;margin-top:10px}
.pf h1{font-family:'SaarSP',Arial,sans-serif;font-size:clamp(34px,6vw,58px);font-weight:400;line-height:.95;letter-spacing:0;margin:14px 0 12px}
.pf .hero{position:relative;overflow:hidden;height:18px;margin:2px 0 40px;background:transparent}
.pf .hero canvas{position:absolute;inset:0;display:block}
.pf .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.pf .sub{font-size:16px;font-weight:700;color:#d8d0d0;max-width:520px;line-height:1.5;margin:0 0 32px}
.pf .filters{display:flex;flex-wrap:wrap;align-items:baseline;gap:24px;margin-bottom:26px}
.pf .f{background:none;border:0;border-radius:0;padding:0 0 8px;font:inherit;font-size:14px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#b6afaf;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
.pf .f:hover{color:#fff}
.pf .f.active{color:#cf2c04;border-bottom-color:#cf2c04}
.pf .f .fc{margin-left:6px;font-size:11px;font-weight:600;color:#8f8888;letter-spacing:0;text-transform:none}
.pf .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.pf .tile{position:relative;border:0;padding:0;background:#262625;border-radius:10px;overflow:hidden;cursor:pointer;text-align:left;font:inherit;color:#fff;aspect-ratio:1/1;display:block}
.pf .tile img{width:100%;height:100%;object-fit:cover;display:block;transition:.3s;filter:brightness(.92)}
.pf .tile:hover img{transform:scale(1.05);filter:brightness(.5)}
.pf .ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s}
.pf .tile:hover .ov{opacity:1}
.pf .pl{width:54px;height:54px;border-radius:50%;background:#cf2c04;color:#ffffff;display:flex;align-items:center;justify-content:center;gap:5px;font-size:20px;font-style:normal;padding-left:4px}
.pf .pl .pb{width:5px;height:18px;border-radius:1px;background:#fff}
.pf .tile.playing .ov{opacity:1}
.pf .tile.playing img{filter:brightness(.5)}
.pf .tile.playing:not(.paused) .pl{padding-left:0}
.pf .meta{position:absolute;left:0;right:0;bottom:0;padding:14px 14px 12px;background:linear-gradient(transparent,rgba(0,0,0,.85));display:flex;flex-direction:column;gap:1px}
.pf .art{color:#cf2c04;font-size:12px;font-weight:700;letter-spacing:.2px}
.pf .ia{font-size:.8em;font-weight:700;margin-left:1px}
.pf .iadisc{max-width:560px;margin:26px auto 0;font-size:12px;line-height:1.5;color:#918b8b}
.pf .trk{font-family:'SaarSP',Arial,sans-serif;font-size:16px;font-weight:400;letter-spacing:.01em;line-height:1.08;margin-top:3px}
.pf .yr{font-size:11px;font-weight:500;color:#9a9292;margin-top:2px;opacity:0;transition:opacity .2s}
.pf .tile:hover .yr{opacity:1}
.pf .tile.hide{display:none}
.pf .pffoot{margin-top:64px;padding-top:42px;border-top:1px solid rgba(255,255,255,.09);text-align:center}
.pf .pfcontact{position:relative;display:inline-block}
.pf .pfcta{display:inline-flex;align-items:center;gap:9px;background:none;color:#fff;font-weight:800;font-size:17px;font-family:inherit;letter-spacing:.06em;text-transform:uppercase;border:0;cursor:pointer;padding:0 0 9px;border-bottom:2px solid rgba(255,255,255,.22);transition:color .15s,border-color .15s}
.pf .pfcta:hover{color:#cf2c04;border-bottom-color:#cf2c04}
.pf .pfcta.on{color:#cf2c04;border-bottom-color:#cf2c04}
.pf .pfcta .ar{font-size:11px;color:#cf2c04;transition:transform .15s}
.pf .pfcta.on .ar{transform:rotate(180deg)}
.pf .pfmenu{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(100% + 12px);background:#262625;border:1px solid #3a3935;border-radius:12px;padding:6px;min-width:240px;display:none;z-index:60}
.pf .pfmenu.on{display:block}
.pf .pfmenu a{display:block;color:#fff;text-decoration:none;font-weight:600;font-size:15px;padding:12px 16px;border-radius:8px;text-align:left;transition:.12s}
.pf .pfmenu a:hover{background:#cf2c04}
.pf .pfactions{display:flex;flex-wrap:wrap;justify-content:center;align-items:baseline;gap:28px}
.pf .pfmenu .pp{display:flex;align-items:baseline;justify-content:space-between;gap:18px;padding:12px 16px;font-size:14px}
.pf .pfmenu .pp+.pp{border-top:1px solid #3a3935}
.pf .pfmenu .ppk{color:#918b8b;font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-size:12px}
.pf .pfmenu .ppv{color:#e7e2e2;font-weight:700;white-space:nowrap}
.pf .player{position:fixed;left:0;right:0;bottom:0;background:#111110;border-top:1px solid #2a2a28;padding:10px 16px;transform:translateY(110%);transition:.3s;z-index:50}
.pf .player.on{transform:none}
.pf .player .inner{max-width:760px;margin:0 auto;display:flex;align-items:center;gap:12px}
.pf .player iframe{flex:1;border:0;border-radius:12px}
.pf .player .cl{background:transparent;border:0;color:#8f8888;font-size:24px;cursor:pointer;line-height:1;padding:4px 6px}

function plt(n){var a=n%10,b=n%100,w=(a===1&&b!==11)?'трек':(a>=2&&a<=4&&(b<10||b>=20))?'трека':'треков';return n+' '+w;}
function rows(tracks){var h="";tracks.forEach(function(t){h+='<button class="arow" data-id="'+t.id+'"><span class="atrk">'+ae(t.title)+'</span></button>';});return h;}
function show(h){var b=document.getElementById("abody");b.innerHTML=h;b.querySelectorAll(".arow").forEach(function(x){x.onclick=function(){play(x);closeAlbum();};});document.getElementById("amodal").classList.add("on");}
function openAlbum(i){var a=ALBUMS[i];var ia=/MORGENSHTERN/i.test(a.artist)?'<sup class="ia">*</sup>':'';show('<div class="ahead"><img src="'+ae(a.cover)+'"><div><div class="aart">'+ae(a.artist)+ia+'</div><div class="aalb">'+ae(a.name)+'</div></div></div>'+rows(a.tracks));}
function closeAlbum(){document.getElementById("amodal").classList.remove("on");}
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeAlbum();});

<script>
function toggleContact(e){
  e.stopPropagation();
  closeFootMenus('pfmenu');
  document.getElementById('pfmenu').classList.toggle('on');
  document.getElementById('pfcta').classList.toggle('on');
}
function toggleTerms(e){
  e.stopPropagation();
  closeFootMenus('pftermsmenu');
  document.getElementById('pftermsmenu').classList.toggle('on');
  document.getElementById('pfterms').classList.toggle('on');
}
function closeFootMenus(except){
  [['pfmenu','pfcta'],['pftermsmenu','pfterms']].forEach(function(p){
    if(p[0]===except)return;
    var m=document.getElementById(p[0]),c=document.getElementById(p[1]);
    if(m){ m.classList.remove('on'); c.classList.remove('on'); }
  });
}
document.addEventListener('click',function(){ closeFootMenus(); });
var spotifyCtrl=null, pendingUri=null, curTile=null, wantPlay=false;
var IC_PLAY='&#9654;', IC_PAUSE='<span class="pb"></span><span class="pb"></span>';
function setIcon(el,html){ if(!el) return; var pl=el.querySelector('.pl'); if(pl) pl.innerHTML=html; }
function syncIcon(isPlaying){ if(!curTile) return; curTile.classList.toggle('paused',!isPlaying); setIcon(curTile,isPlaying?IC_PAUSE:IC_PLAY); }
window.onSpotifyIframeApiReady=function(API){
  API.createController(document.getElementById('pframe'),{width:'100%',height:80,uri:''},function(c){
    spotifyCtrl=c;
    c.addListener('playback_update',function(e){ if(e&&e.data){ syncIcon(!e.data.isPaused); if(!e.data.isPaused&&curTile) curTile.classList.remove('retap'); if(wantPlay&&e.data.isPaused){ wantPlay=false; c.resume(); if(curTile) curTile.classList.add('retap'); } } });
    if(pendingUri){ wantPlay=true; c.loadUri(pendingUri); c.play(); pendingUri=null; }
  });
};
function play(el){
  if(el===curTile){ if(spotifyCtrl) spotifyCtrl.togglePlay(); return; }
  if(curTile){ curTile.classList.remove('playing','paused','retap'); setIcon(curTile,IC_PLAY); }
  curTile=el; el.classList.add('playing'); el.classList.remove('retap'); setIcon(el,IC_PLAY);
  var uri='spotify:track:'+el.dataset.id;
  var pl=document.getElementById('player'); pl.dataset.tid=el.dataset.id||'';
  pl.classList.add('on');
  if(spotifyCtrl){ wantPlay=true; spotifyCtrl.loadUri(uri); spotifyCtrl.play(); }
  else { pendingUri=uri; }
}
function stop(){
  document.getElementById('player').classList.remove('on');
  if(spotifyCtrl) spotifyCtrl.pause();
  if(curTile){ curTile.classList.remove('playing','paused','retap'); setIcon(curTile,IC_PLAY); curTile=null; }
}
function filt(b){
  document.querySelectorAll('.pf .f').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  var f=b.dataset.f;
  document.querySelectorAll('.pf .tile').forEach(t=>{
    var ok = f==='ALL'
      || ((f==='GRAM'||f==='TOP1') ? (t.dataset.aw||'').split(' ').indexOf(f)>=0 : t.dataset.g===f);
    t.classList.toggle('hide', !ok);
  });
}
</script>

(function(){
  document.querySelectorAll('.pf .filters .f[data-f]').forEach(function(f){
    var g=f.dataset.f; if(g==='ALL') return;
    var sel=(g==='GRAM'||g==='TOP1') ? '.pf .tile[data-aw~="'+g+'"]' : '.pf .tile[data-g="'+g+'"]';
    var n=document.querySelectorAll(sel).length;
    if(n){ var s=document.createElement('span'); s.className='fc'; s.textContent=n; f.appendChild(s); }
  });
})();

<script>
/* Glowy reactive waves — vanilla port of the React canvas hero, themed to the brand */
(function(){
  var hero=document.getElementById('hero'), canvas=document.getElementById('waves'), player=document.getElementById('player');
  if(!hero||!canvas) return;
  var ctx=canvas.getContext('2d'); if(!ctx) return;
  var reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var dpr=Math.min(window.devicePixelRatio||1,2);
  var W=0,H=0,t=0,raf=0,level=0,levelTarget=0;
  var mouse={x:0,y:0}, target={x:0,y:0};
  var mInfl=reduce?0:28, mRadius=280, smooth=0.1;
  var lines=[
    {o:0.9, a:9, f:0.011, c:'#4a4644', op:0.85, w:1.2},
    {o:0,   a:15,f:0.013, c:'#cf2c04', op:1,    w:2.2}
  ];
  // procedural "spectrum": per-track seeded frequency bands, pulsed to a beat
  var bands=[], gainSum=1, beatHz=2, seed=1, eng=0.6;
  function hashStr(s){ var h=2166136261; s=String(s); for(var i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
  function setSeed(id){
    var h=hashStr(id||'idle'); seed=h; beatHz=(92+h%56)/60; // tempo 92..147 bpm from track id
    bands=[]; gainSum=0;
    for(var i=0;i<5;i++){ var hh=hashStr(h+'_'+i); var g=0.45+(hh%100)/100*0.85;
      bands.push({ f:0.005+i*0.006+(hh%5)*0.0012, ph:(hh%628)/100, g:g, sp:0.008+(hh%9)*0.004 }); gainSum+=g; }
    if(gainSum<=0) gainSum=1;
  }
  setSeed('idle');
  function resize(){
    var r=hero.getBoundingClientRect(); W=r.width; H=r.height;
    canvas.width=W*dpr; canvas.height=H*dpr; canvas.style.width=W+'px'; canvas.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    mouse.x=target.x=W/2; mouse.y=target.y=H/2;
  }
  function drawLine(w){
    ctx.save(); ctx.beginPath();
    var hs=H/100;
    var yb=H/2 - 4*(1-level); // lift baseline in idle, settle to center when playing
    var ampPx=1.0 + 6.0*level*eng; // calm in idle, swells on each beat while playing
    var spd=1+2.2*level; // bands travel faster when playing
    for(var x=0;x<=W;x+=2){
      var dx=x-mouse.x, dy=yb-mouse.y, dist=Math.sqrt(dx*dx+dy*dy);
      var infl=Math.max(0,1-dist/mRadius);
      var me=infl*mInfl*hs*Math.sin(t*0.0012+x*0.012+w.o)*level;
      var s=0;
      for(var i=0;i<bands.length;i++){ var bd=bands[i]; s+=bd.g*Math.sin(x*bd.f+t*bd.sp*spd+bd.ph+w.o); }
      var y=yb + (s/gainSum)*ampPx + me;
      x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.lineWidth=w.w; ctx.strokeStyle=w.c; ctx.globalAlpha=w.op*level;
    ctx.lineJoin='round'; ctx.lineCap='round'; ctx.shadowBlur=0; ctx.stroke(); ctx.restore();
  }
  function render(){
    ctx.clearRect(0,0,W,H);
    ctx.globalAlpha=1; ctx.shadowBlur=0;
    if(level>0.003) lines.forEach(drawLine);
  }
  function frame(){
    t+=1;
    var sec=t/60;
    var beat=Math.pow(Math.abs(Math.sin(Math.PI*sec*beatHz)),2.4); // sharp pulse on every beat
    var section=0.6+0.4*Math.sin(sec*0.32+(seed%100)/16); // slow build/drop across the track
    eng=(0.35+0.65*beat)*section; if(eng<0) eng=0;
    level+=(levelTarget-level)*0.06;
    mouse.x+=(target.x-mouse.x)*smooth; mouse.y+=(target.y-mouse.y)*smooth;
    render();
    if(levelTarget===0 && level<0.004){ level=0; render(); raf=0; return; }
    raf=requestAnimationFrame(frame);
  }
  function run(){ if(!raf) raf=requestAnimationFrame(frame); }
  var idle=reduce?0:0.14;
  function setPlaying(p){ levelTarget=p?1:idle; if(!reduce) run(); }
  resize();
  window.addEventListener('resize',function(){ resize(); render(); });
  if(!reduce){
    window.addEventListener('mousemove',function(e){ var r=canvas.getBoundingClientRect(); target.x=e.clientX-r.left; target.y=e.clientY-r.top; });
    window.addEventListener('mouseleave',function(){ target.x=W/2; target.y=H/2; });
  }
  if(player){
    new MutationObserver(function(){ var on=player.classList.contains('on'); if(on) setSeed(player.dataset.tid); setPlaying(on); }).observe(player,{attributes:true,attributeFilter:['class']});
    if(player.classList.contains('on')){ setSeed(player.dataset.tid); setPlaying(true); }
  }
  if(!reduce){ levelTarget=idle; run(); }
  render();
})();
</script>

document.addEventListener('click', function(e){
  if (typeof gtag !== 'function') return;
  var t = e.target.closest('a, button');
  if (!t) return;
  if (t.id === 'pfcta') gtag('event', 'click_contact');
  else if (t.id === 'pfterms') gtag('event', 'click_terms');
  else if (t.matches('a.pflink:not(.pfworks)')) gtag('event', 'click_course');
  else if (t.closest('#pfmenu')) {
    var h = t.getAttribute('href') || '';
    gtag('event', h.indexOf('podlesnyy') > -1 ? 'contact_anton' : 'contact_pavel');
  }
});
</script>
<!-- Smooth scroll (Lenis). Desktop + non-reduced-motion only; touch keeps native
     scroll. If the CDN is blocked, Lenis is undefined and we silently fall back. -->
<script src="https://cdn.jsdelivr.net/npm/lenis@1.1.20/dist/lenis.min.js" defer></script>
<script>
window.addEventListener('load',function(){
  var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  var coarse=matchMedia('(pointer: coarse)').matches;
  if(reduce||coarse||typeof Lenis==='undefined') return;
  var lenis=new Lenis({duration:1.05,easing:function(t){return 1-Math.pow(1-t,4);}});
  function raf(time){ lenis.raf(time); requestAnimationFrame(raf); }
  requestAnimationFrame(raf);
});
</script>
