<script>
function toggleContact(e){
  e.stopPropagation();
  document.getElementById('pfmenu').classList.toggle('on');
  document.getElementById('pfcta').classList.toggle('on');
}
document.addEventListener('click',function(){
  var m=document.getElementById('pfmenu'),c=document.getElementById('pfcta');
  if(m){ m.classList.remove('on'); c.classList.remove('on'); }
});
function play(el){
  document.getElementById('pframe').src='https://open.spotify.com/embed/track/'+el.dataset.id+'?utm_source=portfolio';
  document.getElementById('player').classList.add('on');
}
function stop(){
  document.getElementById('player').classList.remove('on');
  document.getElementById('pframe').src='';
}
function filt(b){
  document.querySelectorAll('.pf .f').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  var f=b.dataset.f;
  document.querySelectorAll('.pf .tile').forEach(t=>{
    t.classList.toggle('hide', f!=='ALL' && t.dataset.g!==f);
  });
}
